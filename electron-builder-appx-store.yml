# INSTRUCT-MSIX-STORE-BUILD — Microsoft Store submission appx config.
#
# Built from `electron-builder-appx.yml` (the sideload variant) by swapping
# the Identity block to the values reserved in Partner Center and removing
# the self-signed PFX hookup.  Store-submission appx packages are uploaded
# unsigned; Microsoft re-signs after certification, so signing locally
# would actually be rejected.
#
# Invoke:
#   npm run build && npx electron-builder --win appx --config electron-builder-appx-store.yml
#
# The sideload config (`electron-builder-appx.yml`) must remain untouched
# so local sideload verification keeps working with the dev cert.
appId: com.brightryo.mojioko
productName: MOJIOKO
copyright: "Copyright © 2026 brightryo"

directories:
  buildResources: build
  # Distinct output dir from the sideload pipeline so artefacts don't
  # collide on disk.  Sideload writes to `dist-appx/`; Store writes here.
  output: dist-appx/store

files:
  - out/**/*
  - "!out/**/*.map"

extraResources:
  - from: resources/bin/ffmpeg
    to: bin/ffmpeg
    filter:
      - "ffmpeg.exe"
      - "ffprobe.exe"
      - "*.dll"
  - from: resources/bin/transcriber
    to: bin/transcriber
    filter:
      - "**/*"
  - from: resources/fonts
    to: fonts
    filter:
      - "**/*.ttf"
      - "**/OFL.txt"
      - "**/LICENSE*"
  - from: python-sidecar
    to: python-sidecar
    filter:
      - "main.py"
      - "requirements.txt"
  - from: installer/licenses
    to: licenses
  - from: build
    to: icons
    filter:
      - "icon.ico"

win:
  target:
    - target: appx
      arch: x64
  icon: build/icon.ico
  # INSTRUCT-MSIX-STORE-BUILD — NO signing for Store submissions.  Microsoft
  # re-signs after certification with their publisher cert; uploading a
  # locally-signed package whose cert subject does not match the assigned
  # publisher will fail validation in Partner Center.  Therefore
  # certificateFile / certificatePassword are intentionally absent here.

# AppX Identity — values reserved in Partner Center.  Must match exactly
# (including casing) or Partner Center rejects the upload.
#   Identity/Name:               BrightRyo.MOJIOKO   (capital B, capital R)
#   Identity/Publisher:          CN=83F5D6ED-62DB-48FB-93C6-A21CBB5D8A86
#   PublisherDisplayName:        BrightRyo
appx:
  identityName: BrightRyo.MOJIOKO
  publisher: CN=83F5D6ED-62DB-48FB-93C6-A21CBB5D8A86
  publisherDisplayName: BrightRyo
  applicationId: MOJIOKO
  # REQ-090 — was "#0a0a0a" (near-black) which clashed with the green
  # tile PNGs generated by scripts/generate-msix-tiles.ps1 into
  # build/appx/.  Matched to #23C55E (Tailwind green-500, sampled
  # from docs/images/icon.png) so the tile's solid background, the
  # ASS-painted M, and the manifest-level BackgroundColor that the
  # Start menu may flash for the brief moment before the PNG
  # rasterises all stay on the same brand colour.
  backgroundColor: "#23C55E"
  displayName: MOJIOKO
  languages:
    - ja-jp
    - en-us
  # Store handles updates; no AppInstaller / auto-launch extensions needed.
  addAutoLaunchExtension: false
  electronUpdaterAware: false

publish: null
