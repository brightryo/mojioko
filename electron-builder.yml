appId: com.brightryo.mojioko
productName: MOJIOKO
copyright: "Copyright © 2026 BrightRyo"

directories:
  buildResources: build
  output: dist

# electron-vite emits the compiled main/preload/renderer bundle under `out/`.
# These are the files actually loaded at runtime; the source tree is excluded.
files:
  - out/**/*
  - "!out/**/*.map"

extraResources:
  # ffmpeg/ffprobe are shipped as the LGPL **shared** build, so the surrounding
  # av*.dll / sw*.dll runtime libraries must travel with the .exe — otherwise
  # the Windows loader fails before main() and the spawn surfaces as
  # "Command failed". ffplay.exe is intentionally excluded (unused, ~17MB).
  - from: resources/bin/ffmpeg
    to: bin/ffmpeg
    filter:
      - "ffmpeg.exe"
      - "ffprobe.exe"
      - "*.dll"
  # PyInstaller --onedir output (mojioko-transcriber.exe + _internal/) goes here.
  # Shipped only when the directory exists; missing files are silently dropped
  # by electron-builder, so dev builds without a PyInstaller artifact still work
  # — the runtime then falls back to the .venv route logged with a warning.
  - from: resources/bin/transcriber
    to: bin/transcriber
    filter:
      - "**/*"
  - from: resources/fonts
    to: fonts
    filter:
      - "**/*.ttf"
      # SIL OFL v1.1 license text shipped alongside each bundled font.
      # OFL §3.2 requires the licence to be distributed with the Font
      # Software — without this filter entry the licence files exist in
      # the source tree but never reach the packaged installer.
      - "**/OFL.txt"
      - "**/LICENSE*"
  - from: python-sidecar
    to: python-sidecar
    filter:
      - "main.py"
      - "requirements.txt"
  - from: installer/licenses
    to: licenses
  # REQ-0258 — MOJIOKO's proprietary EULA files.  NSIS already shows
  # `build/license_ja.txt` at install time via `nsis.license` below,
  # but the same file is also required INSIDE the packaged app so the
  # About dialog's "View EULA" button (added in REQ-0258) can read it
  # via `<resourcesPath>/eula/license_<lang>.txt`.  MSIX / AppX has no
  # install-time EULA hook at all — the AppXOptions type in
  # electron-builder carries no `license:` field, verified against
  # node_modules/app-builder-lib/out/options/AppXOptions.d.ts — so this
  # in-app dialog is the paid edition's only path to the EULA body.
  # Both languages ship every build (both editions surface both
  # translations depending on the runtime UI language).
  - from: build
    to: eula
    filter:
      - "license_ja.txt"
      - "license_en.txt"
  # icon.ico needs to live next to the packaged app at runtime so the
  # BrowserWindow constructor can pass it to Windows as the title-bar /
  # taskbar icon.  Without this entry the EXE itself still has its embedded
  # icon (from win.icon below), but the live BrowserWindow falls back to
  # Electron's default logo.  Source is `build/icon.ico` — the
  # `buildResources` directory — so it lines up with where electron-builder
  # already reads the installer / EXE icons from.
  - from: build
    to: icons
    filter:
      - "icon.ico"

win:
  target:
    - target: nsis
      arch: x64
  # Single source of truth for the app icon: `build/icon.ico`.  electron-builder
  # embeds this multi-size .ico into the EXE so Windows can pick 16/24/32/48/
  # 64/128/256-px variants automatically for taskbar, title bar, shortcuts,
  # Alt-Tab, etc.
  icon: build/icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  # Dot-separated installer filename so the .exe survives GitHub Releases'
  # whitespace-to-dot mangling AND matches the docs/index.html deep-link
  # URLs (`MOJIOKO.Setup.<VERSION>.exe`) that have been published since
  # v1.2.0.  electron-builder's default would emit
  # `MOJIOKO Setup <VERSION>.exe`; GitHub then exposes the asset as
  # `MOJIOKO.Setup.<VERSION>.exe` from one redirect and as the spaced
  # original from another, which previously broke deep-link download URLs
  # (404).  Pre-naming the artifact with explicit dots short-circuits the
  # mangling — the file is `MOJIOKO.Setup.<VERSION>.exe` on disk, the
  # same name on GitHub, and the same URL the docs page targets.
  # REQ-20260613-008 §3 reverted the prior REQ-133 hyphen scheme in
  # favour of dots to match the published docs URL without a docs-side
  # rewrite.
  artifactName: ${productName}.Setup.${version}.${ext}
  # Multi-step wizard installer: welcome → license → install dir → progress →
  # finish.  Pre-v1.0.0 we shipped oneClick:true, but a published license
  # (EULA) acceptance step is a legal-feeling requirement that NSIS surfaces
  # automatically when `license:` is set AND `oneClick:false`.
  oneClick: false
  perMachine: false
  # Suppresses the "Install for all users / current user only" elevation page
  # — combined with perMachine:false the installer writes to
  # %LOCALAPPDATA%\Programs\mojioko without any UAC prompt.
  allowElevation: false
  # User can override the default install path on the dir-picker page.
  allowToChangeInstallationDirectory: true
  # Default UI language; OS locale picks ja_JP vs en_US automatically from the
  # installerLanguages list below at first launch of the installer.
  installerLanguages:
    - ja_JP
    - en_US
  language: "1041"
  include: build/installer.nsh
  # v1.3.1 (REQ-20260615-071): aligned with the MSIX uninstall semantic.
  # MSIX automatically removes `%LOCALAPPDATA%\Packages\<PFN>\…` on
  # uninstall (opt-out impossible), so the NSIS side does the same for
  # `%APPDATA%\MOJIOKO\` — models, settings, logs, downloaded fonts all
  # gone.  This is **only** triggered on a user-initiated uninstall:
  # electron-builder's upgrade flow passes `--updated` to the old
  # uninstaller, which the template (`uninstaller.nsh:206`) checks via
  # `${ifNot} ${isUpdated}` before deleting AppData.  Verified in
  # node_modules/app-builder-lib/templates/nsis/uninstaller.nsh.
  deleteAppDataOnUninstall: true
  # End-User License Agreement.
  #
  # electron-builder NSIS convention: when `license` points at
  # `build/license_<lang>.txt`, electron-builder also discovers sibling files
  # following the same `license_<lang>.txt` naming and assigns them to the
  # matching installer language.  We therefore only need to set the Japanese
  # file here; `build/license_en.txt` is picked up automatically for the
  # English installer language.
  license: build/license_ja.txt
  # Show the "Run MOJIOKO" checkbox (checked by default) on the finish page.
  runAfterFinish: true
  # Render the desktop shortcut option as a pre-checked checkbox on the
  # finish page so the user can opt out if they want a clean desktop.
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MOJIOKO
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

publish: null
